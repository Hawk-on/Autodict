name: Release

# Byggjer ein SIGNERT release-APK, lagar checksum, (attesterer proveniens om mogleg) og
# publiserer alt som ein GitHub Release.
#
# To måtar å trigge:
#   1. workflow_dispatch (tilrådd, fungerer frå mobil): Actions → Release → Run workflow,
#      skriv versjon (t.d. v0.1.2). Workflowen lagar sjølv tag + release + artefakt.
#   2. push av ein tag vMAJOR.MINOR.PATCH (frå ei maskin med push-tilgang).
#
# IKKJE lag release-en manuelt i web-UI-et: med "immutable releases" blir han låst ved
# publisering, og då får workflowen ikkje lagt på APK-en. Lat workflowen gjere det.
#
# Krev fire repository-secrets — sjå RELEASING.md:
#   RELEASE_KEYSTORE_BASE64, RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versjon å sleppe (t.d. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write # opprette release + laste opp artefakt
  id-token: write # OIDC-token for keyless attestasjon
  attestations: write # actions/attest-build-provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Release treng ikkje sende inn dependency-graf (android.yml gjer det på main).
          dependency-graph: disabled

      - name: Utled versjon
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Versjon '$tag' må vere på forma vMAJOR.MINOR.PATCH (t.d. v0.1.2)."
            exit 1
          fi
          name="${tag#v}"
          IFS=. read -r major minor patch <<< "$name"
          # versionCode må vere monotont aukande; krev MINOR/PATCH < 100.
          if [ "$minor" -ge 100 ] || [ "$patch" -ge 100 ]; then
            echo "::error::minor/patch må vere < 100 for versionCode-utrekninga ($name)."
            exit 1
          fi
          code=$(( major * 10000 + minor * 100 + patch ))
          {
            echo "tag=$tag"
            echo "name=$name"
            echo "code=$code"
          } >> "$GITHUB_OUTPUT"
          echo "Release $tag (versionName $name, versionCode $code)"

      - name: Dekod release-keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Secret RELEASE_KEYSTORE_BASE64 manglar. Sjå RELEASING.md."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Byggje signert release-APK
        env:
          RELEASE_VERSION_NAME: ${{ steps.ver.outputs.name }}
          RELEASE_VERSION_CODE: ${{ steps.ver.outputs.code }}
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verifiser at APK-en er signert
        run: |
          apk=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          # Vel éin (nyaste) apksigner – runneren har fleire build-tools-versjonar,
          # så ein glob ville sendt fleire stiar inn som argument.
          apksigner=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n1)
          echo "Brukar: $apksigner"
          "$apksigner" verify --verbose "$apk"

      - name: Gi nytt namn + lag checksum
        id: artefakt
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          src=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          out="autodict-${tag}.apk"
          cp "$src" "$out"
          sha256sum "$out" > SHA256SUMS
          echo "apk=$out" >> "$GITHUB_OUTPUT"

      - name: Attester build-proveniens (SLSA)
        # Berre tilgjengeleg for offentlege repo (eller org + GitHub Advanced Security).
        # Hoppar pent over på private brukar-repo; aktiverast automatisk om repoet blir
        # offentleg. continue-on-error som ekstra sikring.
        if: ${{ !github.event.repository.private }}
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.artefakt.outputs.apk }}

      - name: Publiser GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          # Immutable releases låser ved publisering, så artefakta MÅ vere på plass før det.
          # Difor: lag som draft, last opp, og publiser deretter.
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "Autodict ${{ steps.ver.outputs.name }}" \
            --generate-notes \
            --draft \
            "${{ steps.artefakt.outputs.apk }}" SHA256SUMS
          gh release edit "$tag" --draft=false --latest
