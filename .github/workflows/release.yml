name: Release

# Byggjer ein SIGNERT release-APK, lagar checksum, attesterer proveniens (SLSA via
# sigstore/Rekor) og publiserer alt som ein GitHub Release.
#
# Trigg: push av ein tag som byrjar med "v" (t.d. v0.1.0), eller manuelt via
# workflow_dispatch (køyr då mot ein tag-ref i UI-et).
#
# Krev fire repository-secrets — sjå RELEASING.md:
#   RELEASE_KEYSTORE_BASE64, RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # opprette release + laste opp artefakt
  id-token: write # OIDC-token for keyless attestasjon
  attestations: write # actions/attest-build-provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Utled versjon frå tag
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Taggen '$tag' må vere på forma vMAJOR.MINOR.PATCH (t.d. v0.2.0)."
            exit 1
          fi
          name="${tag#v}"
          IFS=. read -r major minor patch <<< "$name"
          # versionCode må vere monotont aukande; krev MINOR/PATCH < 100.
          if [ "$minor" -ge 100 ] || [ "$patch" -ge 100 ]; then
            echo "::error::minor/patch må vere < 100 for versionCode-utrekninga ($name)."
            exit 1
          fi
          code=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Release $name (versionCode $code)"

      - name: Dekod release-keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Secret RELEASE_KEYSTORE_BASE64 manglar. Sjå RELEASING.md."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Byggje signert release-APK
        env:
          RELEASE_VERSION_NAME: ${{ steps.ver.outputs.name }}
          RELEASE_VERSION_CODE: ${{ steps.ver.outputs.code }}
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verifiser at APK-en er signert
        run: |
          apk=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          "$ANDROID_HOME"/build-tools/*/apksigner verify --verbose "$apk"

      - name: Gi nytt namn + lag checksum
        id: artefakt
        run: |
          tag="${GITHUB_REF_NAME}"
          src=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          out="autodict-${tag}.apk"
          cp "$src" "$out"
          sha256sum "$out" > SHA256SUMS
          echo "apk=$out" >> "$GITHUB_OUTPUT"

      - name: Attester build-proveniens (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.artefakt.outputs.apk }}

      - name: Publiser GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artefakt.outputs.apk }}
            SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
