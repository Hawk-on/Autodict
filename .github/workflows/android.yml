name: Android CI

# Byggjer debug-APK på GitHub sine tenarar (som har Android SDK + Google Maven-tilgang).
# Gir både kompilerings-verifisering og ein installerbar APK du kan laste ned til telefonen.

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Avbryt eldre, uferdige køyringar på same branch når ein ny push kjem (sparar CI-minutt).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Éin Gradle-invokasjon: konfigurerer éin gong og deler Kotlin-/Compose-kompileringa
      # på tvers av assemble/test/lint i staden for tre separate køyringar. Variant-
      # spesifikke taskar (Debug) hoppar over release-test/-lint som CI ikkje treng.
      - name: Byggje + test + lint
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: autodict-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
